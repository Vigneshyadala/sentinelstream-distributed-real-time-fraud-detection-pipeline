version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# SentinelStream — Distributed Real-Time Fraud Detection Pipeline
#
# Architecture decision notes:
#   - Confluent images are used for Kafka/Zookeeper because they are the
#     de-facto industry standard, ship first-class healthchecks, and are what
#     most fintech engineering teams run in production (vs. bare Apache
#     tarballs, which have no first-party Docker images).
#   - TimescaleDB (Postgres + time-series extension) is used as the "speed
#     layer" DB instead of vanilla Postgres so that fraud_alerts can be a
#     hypertable — this gives us automatic time-based partitioning, which
#     matters once the alerts table grows past a few million rows.
#   - MinIO gives us an S3-compatible data lake locally, so the batch/raw
#     layer code (boto3, parquet writers) is IDENTICAL to what you'd run
#     against real AWS S3 in production — only the endpoint_url changes.
#   - depends_on + healthcheck + `condition: service_healthy` guarantees the
#     producer/processor never race a Kafka broker or DB that's still booting.
# ─────────────────────────────────────────────────────────────────────────────

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: sentinel-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat,mntr"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - sentinel-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sentinel-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"   # host-facing listener (used by producer.py / processor.py running on your machine)
      - "29092:29092" # internal, container-to-container listener
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listeners: one for other containers on the docker network (internal),
      # one advertised as localhost for scripts you run directly on your host machine.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - sentinel-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sentinel-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_pw
      POSTGRES_DB: fraud_detection
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d fraud_detection"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sentinel-net

  minio:
    image: minio/minio:latest
    container_name: sentinel-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: sentinel_admin
      MINIO_ROOT_PASSWORD: sentinel_secret
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sentinel-net

  # One-shot helper container: creates the "fraud-lake" bucket on startup so
  # processor.py never has to worry about bucket-not-found races.
  minio-init:
    image: minio/mc:latest
    container_name: sentinel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 sentinel_admin sentinel_secret &&
      mc mb -p local/fraud-lake &&
      mc anonymous set download local/fraud-lake &&
      echo 'fraud-lake bucket ready'
      "
    networks:
      - sentinel-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: sentinel-grafana
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - sentinel-net

networks:
  sentinel-net:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  timescale-data:
  minio-data:
  grafana-data:
